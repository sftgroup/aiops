<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operator Console — AIOPS SAAS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{'dark-card':'#1a1a2e','dark-bg':'#0f0f1a','dark-border':'#2a2a3e','dark-hover':'#252540','accent-primary':'#6366f1'}}}}</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body{background:#0f0f1a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f0f1a}::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:3px}
  .login-bg{background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(147,51,234,0.06) 0%,transparent 50%),#0f0f1a}
  .input-glow:focus{box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
</style>
</head>
<body class="min-h-screen login-bg flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo Area -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-accent-primary to-purple-600 mb-4 shadow-lg shadow-accent-primary/25">
        <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
      </div>
      <h1 class="text-2xl font-bold tracking-tight">Operator Console</h1>
      <p class="text-sm text-gray-500 mt-2">AIOPS SAAS — 运营管理后台</p>
    </div>

    <!-- Login Card -->
    <div class="bg-dark-card rounded-2xl border border-dark-border p-8 shadow-xl">
      <form class="space-y-5" onsubmit="handleLogin(event)">
        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1.5">Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="mail" class="w-4 h-4 text-gray-600"></i>
            </div>
            <input type="email" id="email" required
              class="w-full pl-10 pr-4 py-3 bg-dark-bg border border-dark-border rounded-xl text-white text-sm placeholder:text-gray-600 focus:outline-none focus:border-accent-primary/50 input-glow transition-all"
              placeholder="admin@aiops.cloud">
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-400 mb-1.5">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="lock" class="w-4 h-4 text-gray-600"></i>
            </div>
            <input type="password" id="password" required
              class="w-full pl-10 pr-12 py-3 bg-dark-bg border border-dark-border rounded-xl text-white text-sm placeholder:text-gray-600 focus:outline-none focus:border-accent-primary/50 input-glow transition-all"
              placeholder="••••••••">
            <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-600 hover:text-gray-400 transition-colors">
              <i data-lucide="eye-off" id="eye-icon" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- Remember me -->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" class="w-4 h-4 rounded border-dark-border bg-dark-bg accent-accent-primary">
            <span class="text-xs text-gray-500">Remember me</span>
          </label>
          <a href="#" class="text-xs text-accent-primary hover:text-accent-primary/80 transition-colors">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit"
          class="w-full py-3 bg-gradient-to-r from-accent-primary to-purple-600 rounded-xl text-sm font-semibold text-white hover:shadow-lg hover:shadow-accent-primary/25 transition-all active:scale-[0.98]">
          Sign In
        </button>
      </form>

      <!-- Divider -->
      <div class="mt-6 flex items-center gap-3">
        <hr class="flex-1 border-dark-border">
        <span class="text-xs text-gray-600">SECURE ACCESS</span>
        <hr class="flex-1 border-dark-border">
      </div>

      <!-- Security notice -->
      <div class="mt-4 flex items-center justify-center gap-2 text-xs text-gray-600">
        <i data-lucide="shield-alert" class="w-3.5 h-3.5"></i>
        <span>Authorized operator access only</span>
      </div>
    </div>

    <!-- Footer -->
    <p class="mt-6 text-center text-xs text-gray-700">
      &copy; 2026 AIOPS Cloud Platform. All rights reserved.
    </p>
  </div>

  <script>
    lucide.createIcons();

    function togglePassword() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.setAttribute('data-lucide', 'eye');
      } else {
        pw.type = 'password';
        icon.setAttribute('data-lucide', 'eye-off');
      }
      lucide.createIcons();
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      localStorage.setItem('aiops_operator_token', 'demo-token');
      localStorage.setItem('aiops_operator_user', JSON.stringify({ email, name: 'Super Admin', role: 'admin' }));
      window.location.href = 'operator-dashboard.html';
    }
  </script>
</body>
</html>
